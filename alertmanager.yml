global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity = critical
      receiver: slack-critical
      repeat_interval: 1h

    - matchers:
        - severity = warning
      receiver: slack-warnings

receivers:
  # No-op default — alerts are visible in Prometheus UI and Alertmanager UI
  # without needing a real notification channel configured.
  - name: default

  # To enable Slack: replace the api_url with your webhook URL.
  # Get one at: https://api.slack.com/messaging/webhooks
  - name: slack-warnings
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/WITH/REAL_WEBHOOK"
        channel: "#crypto-api-alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

  - name: slack-critical
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/WITH/REAL_WEBHOOK"
        channel: "#crypto-api-critical"
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  # If the whole service is down, suppress all sub-alerts from the same job
  - source_matchers:
      - alertname = ServiceDown
    target_matchers:
      - severity =~ "warning|critical"
    equal: [job]
