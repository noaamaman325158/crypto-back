global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: crypto_api
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  - job_name: crypto_worker
    static_configs:
      - targets: ["worker:9091"]
    metrics_path: /
