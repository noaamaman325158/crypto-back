[tool.ruff]
target-version = "py310"
line-length = 100
exclude = ["app/grpc_generated/**"]  # auto-generated — do not lint

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
strict = false
exclude = ["app/grpc_generated", "app/grpc_server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests/unit", "tests/integration"]
