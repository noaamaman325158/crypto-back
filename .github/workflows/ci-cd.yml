name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — principle of least privilege (supply chain hardening)
permissions:
  contents: read
  id-token: write  # OIDC token for AWS — no long-lived secrets stored in GitHub

jobs:
  # ── Stage 1: Security gates ──────────────────────────────────────────────────
  # All three security jobs run first, in parallel.
  # Nothing else (lint, test, build) starts until every security gate passes.

  pipeline-scan:
    name: Pipeline SAST (poutine)
    runs-on: ubuntu-latest
    # poutine scans GitHub Actions workflows for: injection via untrusted inputs,
    # dangerous triggers (pull_request_target), unpinned actions, unsafe checkouts.
    # Built by BoostSecurity — the same engine that powers SmokedMeat's analysis phase.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: boostsecurityio/poutine-action@e240ebd3eff8b2db5a8e5f6b28f58739d7db2247  # v1.1.4
        with:
          command: analyze_local .

  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # full history — TruffleHog scans every commit, not just HEAD
      # TruffleHog: detects API keys, tokens, credentials accidentally committed to Git.
      # Scans entire git history so a secret committed and then deleted is still caught.
      - name: TruffleHog — scan git history for secrets
        uses: trufflesecurity/trufflehog@d73edfb85d79432e3c767c407afdee59c9a34fde  # v3.88.1
        with:
          extra_args: --only-verified  # only report secrets that are confirmed live (fewer false positives)

  sast:
    name: SAST + SCA (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # Semgrep: static analysis for code-level security bugs (SQLi, XSS, insecure deserialization,
      # hardcoded secrets, etc.) AND SCA (known vulnerable dependencies).
      # Free for up to 10 developers. No SEMGREP_APP_TOKEN needed for OSS rulesets.
      - name: Semgrep — SAST & SCA scan
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: >
            p/python
            p/fastapi
            p/jwt
            p/secrets
            p/owasp-top-ten
        env:
          # Optional: set SEMGREP_APP_TOKEN to upload results to semgrep.dev dashboard
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  lockfile-check:
    name: Lockfile in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install pip-tools -q
      - name: Verify requirements.lock is up to date with requirements.txt
        run: |
          pip-compile requirements.txt --output-file=requirements.lock.check --quiet
          # Strip all comment lines (including indented ones like "    # via pkg")
          # before diffing — pip-compile regenerates header and annotation comments
          # differently based on the output filename. Only actual pinned versions matter.
          grep -vE '^\s*#' requirements.lock       > requirements.lock.stripped
          grep -vE '^\s*#' requirements.lock.check > requirements.lock.check.stripped
          diff requirements.lock.stripped requirements.lock.check.stripped || \
            (echo "requirements.lock is out of sync. Run: pip-compile requirements.txt --output-file=requirements.lock" && exit 1)
          rm requirements.lock.check requirements.lock.stripped requirements.lock.check.stripped

  sca:
    name: SCA — Dependency CVEs (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install pip-audit==2.7.3
      - name: pip-audit — scan for known CVEs in Python dependencies
        run: pip-audit -r requirements.lock

  iac-validate:
    name: IaC Validation (Terraform + LocalStack)
    runs-on: ubuntu-latest
    needs: [pipeline-scan, secret-scan, sast, sca, lockfile-check]
    services:
      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: ssm,ecr,ecs,iam,logs,s3,elbv2,rds,elasticache
          DEFAULT_REGION: us-east-1
          DEBUG: 0
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: "1.6.6"

      - name: Terraform Validate — production config (syntax only, no AWS)
        working-directory: infra
        run: terraform init -backend=false && terraform validate

      - name: Terraform Init — LocalStack config
        working-directory: infra/localstack
        run: terraform init

      - name: Terraform Plan against LocalStack
        # Plan against LocalStack to catch resource reference errors and
        # missing variable bindings without spending real AWS money.
        # LocalStack config lives in infra/localstack/ — separate from production
        # config to avoid duplicate provider conflicts.
        working-directory: infra/localstack
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          TF_VAR_db_password: localstack-db-pass
          TF_VAR_secret_key: localstack-secret
          TF_VAR_internal_api_key: localstack-api-key
          TF_VAR_anthropic_api_key: localstack-anthropic
          TF_VAR_image_tag: ci-test
        run: |
          terraform plan \
            -var-file=../localstack.tfvars \
            -out=tfplan.binary
          terraform show -no-color tfplan.binary

  # ── Stage 2: Code quality + unit tests ───────────────────────────────────────
  # Lint, type-check, and tests only start after all security gates pass.

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [pipeline-scan, secret-scan, sast, sca, lockfile-check]
    steps:
      # Pin to commit SHA, not tag — tags are mutable and can be hijacked
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install ruff==0.8.4
      - run: ruff check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [pipeline-scan, secret-scan, sast, sca, lockfile-check]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.lock mypy==1.13.0
      - run: mypy app/ --ignore-missing-imports

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [pipeline-scan, secret-scan, sast, sca, lockfile-check]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.lock
      - name: Run unit tests (no DB, no network)
        env:
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
        run: pytest tests/unit/ -v --cov=app --cov-report=xml

  integration-db-test:
    name: Integration Tests (DB)
    runs-on: ubuntu-latest
    needs: [unit-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.lock
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_test
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379
        run: alembic upgrade head
      - name: Run integration tests (real DB + Redis)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_test
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test-key
        run: pytest tests/integration/ -v --cov=app --cov-report=xml

  integration-test:
    name: E2E Tests (Newman)
    runs-on: ubuntu-latest
    needs: integration-db-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_integration
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.lock

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_integration
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379
        run: alembic upgrade head

      - name: Start API server in background
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_integration
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENVIRONMENT: development
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Wait for the server to be ready
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection (integration tests)
        run: |
          newman run postman/collection.json \
            -e postman/env.ci.json \
            --reporters cli,junit \
            --reporter-junit-export newman-results.xml

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: newman-results
          path: newman-results.xml

  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, integration-db-test, integration-test, iac-validate, lockfile-check, pipeline-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # OIDC-based AWS auth — no AWS_ACCESS_KEY_ID stored as GitHub secret
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda  # v2.0.1

      - name: Build and push (tagged with commit SHA — never 'latest')
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS service with new image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
