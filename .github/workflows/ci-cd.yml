name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — principle of least privilege (supply chain hardening)
permissions:
  contents: read
  id-token: write  # OIDC token for AWS — no long-lived secrets stored in GitHub

jobs:
  # ── Stage 1: Security gates ──────────────────────────────────────────────────
  # All three security jobs run first, in parallel.
  # Nothing else (lint, test, build) starts until every security gate passes.

  pipeline-scan:
    name: Pipeline SAST (poutine)
    runs-on: ubuntu-latest
    # poutine scans GitHub Actions workflows for: injection via untrusted inputs,
    # dangerous triggers (pull_request_target), unpinned actions, unsafe checkouts.
    # Built by BoostSecurity — the same engine that powers SmokedMeat's analysis phase.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: boostsecurityio/poutine-action@e240ebd3eff8b2db5a8e5f6b28f58739d7db2247  # v1.1.4
        with:
          command: analyze_local .

  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # full history — TruffleHog scans every commit, not just HEAD
      # TruffleHog: detects API keys, tokens, credentials accidentally committed to Git.
      # Scans entire git history so a secret committed and then deleted is still caught.
      - name: TruffleHog — scan git history for secrets
        uses: trufflesecurity/trufflehog@d73edfb85d79432e3c767c407afdee59c9a34fde  # v3.88.1
        with:
          extra_args: --only-verified  # only report secrets that are confirmed live (fewer false positives)

  sast:
    name: SAST + SCA (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # Semgrep: static analysis for code-level security bugs (SQLi, XSS, insecure deserialization,
      # hardcoded secrets, etc.) AND SCA (known vulnerable dependencies).
      # Free for up to 10 developers. No SEMGREP_APP_TOKEN needed for OSS rulesets.
      - name: Semgrep — SAST & SCA scan
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: >
            p/python
            p/fastapi
            p/jwt
            p/secrets
            p/owasp-top-ten
        env:
          # Optional: set SEMGREP_APP_TOKEN to upload results to semgrep.dev dashboard
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  lockfile-check:
    name: Lockfile in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-tools -q
      - name: Verify requirements.lock is up to date with requirements.txt
        run: |
          pip-compile requirements.txt --output-file=requirements.lock.check --quiet --no-strip-extras
          # Strip all comment lines (including indented ones like "    # via pkg")
          # before diffing — pip-compile regenerates header and annotation comments
          # differently based on the output filename. Only actual pinned versions matter.
          grep -vE '^\s*#' requirements.lock       > requirements.lock.stripped
          grep -vE '^\s*#' requirements.lock.check > requirements.lock.check.stripped
          diff requirements.lock.stripped requirements.lock.check.stripped || \
            (echo "requirements.lock is out of sync. Run: pip-compile requirements.txt --output-file=requirements.lock" && exit 1)
          rm requirements.lock.check requirements.lock.stripped requirements.lock.check.stripped

  sca:
    name: SCA — Dependency CVEs (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-audit==2.7.3
      - name: pip-audit — scan for known CVEs in Python dependencies
        run: pip-audit -r requirements.lock

  iac-validate:
    name: IaC Validation (Terraform + LocalStack)
    runs-on: ubuntu-latest
    needs: [pipeline-scan, secret-scan, sast, sca, lockfile-check]
    services:
      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: ssm,ecr,ecs,iam,logs,s3,elbv2,rds,elasticache,sts,ec2
          DEFAULT_REGION: us-east-1
          DEBUG: 0
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: "1.6.6"

      - name: Terraform Validate — production config (syntax only, no AWS)
        working-directory: infra
        run: terraform init -backend=false && terraform validate

      - name: Terraform Init — LocalStack config
        working-directory: infra/localstack
        run: terraform init

      - name: Terraform Plan against LocalStack
        # Plan against LocalStack to catch resource reference errors and
        # missing variable bindings without spending real AWS money.
        # LocalStack config lives in infra/localstack/ — separate from production
        # config to avoid duplicate provider conflicts.
        working-directory: infra/localstack
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          TF_VAR_db_password: localstack-db-pass
          TF_VAR_secret_key: localstack-secret
          TF_VAR_internal_api_key: localstack-api-key
          TF_VAR_anthropic_api_key: localstack-anthropic
          TF_VAR_image_tag: ci-test
        run: |
          terraform plan \
            -var-file=../localstack.tfvars \
            -out=tfplan.binary
          terraform show -no-color tfplan.binary

  # ── Stage 2: Code quality + unit tests ───────────────────────────────────────
  # Lint, type-check, and tests only start after all security gates pass.

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [pipeline-scan, secret-scan, sast, sca, lockfile-check]
    steps:
      # Pin to commit SHA, not tag — tags are mutable and can be hijacked
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff==0.8.4
      - run: ruff check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [pipeline-scan, secret-scan, sast, sca, lockfile-check]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.lock mypy==1.13.0
      - run: mypy app/ --ignore-missing-imports

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [pipeline-scan, secret-scan, sast, sca, lockfile-check]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.lock
      - name: Run unit tests (no DB, no network)
        env:
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
        run: COVERAGE_FILE=coverage.unit pytest tests/unit/ -v --cov=app --cov-report=term-missing
      - name: Upload unit coverage data
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-unit
          path: coverage.unit
          if-no-files-found: error

  integration-db-test:
    name: Integration Tests (DB)
    runs-on: ubuntu-latest
    needs: [unit-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.lock
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_test
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379
        run: alembic upgrade head
      - name: Run integration tests (real DB + Redis)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_test
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test-key
        run: COVERAGE_FILE=coverage.integration pytest tests/integration/ -v --cov=app --cov-report=term-missing
      - name: Upload integration coverage data
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-integration
          path: coverage.integration
          if-no-files-found: error

  integration-test:
    name: E2E Tests (Newman)
    runs-on: ubuntu-latest
    needs: integration-db-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_integration
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.lock

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_integration
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379
        run: alembic upgrade head

      - name: Start API server in background
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_integration
          SECRET_KEY: test-secret-key
          INTERNAL_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENVIRONMENT: development
        run: |
          # Start uvicorn; redirect logs so we can inspect on failure
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo "Server PID: $!"

          # Poll /health — fail the step explicitly if server never comes up
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Server is up (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start. Logs:"
              cat /tmp/uvicorn.log
              exit 1
            fi
            sleep 2
          done

      - name: Install Newman
        run: npm install -g newman

      - name: Seed coin data before E2E tests
        run: |
          curl -sf -X POST http://localhost:8000/api/v1/cryptocurrencies/refresh \
            -H "X-API-Key: test-api-key" || echo "Seed failed (CoinGecko may be rate-limited in CI — continuing)"

      - name: Run Postman collection (E2E tests)
        run: |
          newman run postman/collection.json \
            -e postman/env.ci.json \
            --reporters cli,junit \
            --reporter-junit-export newman-results.xml

      - name: Print server logs on failure
        if: failure()
        run: cat /tmp/uvicorn.log || true

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: newman-results
          path: newman-results.xml

  performance-test:
    name: Performance Tests (k6 smoke)
    runs-on: ubuntu-latest
    needs: integration-test
    permissions:
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_perf
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.lock

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_perf
          SECRET_KEY: perf-secret-key-32-chars-minimum!
          INTERNAL_API_KEY: perf-api-key
          REDIS_URL: redis://localhost:6379
        run: alembic upgrade head

      - name: Start API server
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_perf
          SECRET_KEY: perf-secret-key-32-chars-minimum!
          INTERNAL_API_KEY: perf-api-key
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: development
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn-perf.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 2
            [ "$i" -eq 30 ] && cat /tmp/uvicorn-perf.log && exit 1
          done

      - name: Install k6
        # Use official k6 GitHub Action — avoids external apt repo DNS failures.
        # Pinned to commit SHA (not tag) for supply-chain safety.
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065  # v1.2.1

      - name: Seed coin data
        run: |
          curl -sf -X POST http://localhost:8000/api/v1/cryptocurrencies/refresh \
            -H "X-API-Key: perf-api-key" || echo "Seed skipped (CoinGecko may be unavailable)"

      - name: k6 smoke — coins (p99 SLO check)
        env:
          K6_SCENARIO: smoke
          BASE_URL: http://localhost:8000
          INTERNAL_API_KEY: perf-api-key
        run: |
          mkdir -p k6/results
          k6 run \
            --env K6_SCENARIO=smoke \
            --env BASE_URL=http://localhost:8000 \
            --env INTERNAL_API_KEY=perf-api-key \
            --out json=k6/results/coins-smoke.json \
            k6/coins.test.js

      - name: k6 smoke — auth (p99 SLO check)
        env:
          K6_SCENARIO: smoke
          BASE_URL: http://localhost:8000
        run: |
          k6 run \
            --env K6_SCENARIO=smoke \
            --env BASE_URL=http://localhost:8000 \
            --out json=k6/results/auth-smoke.json \
            k6/auth.test.js

      - name: k6 smoke — watchlist (p99 SLO check)
        env:
          K6_SCENARIO: smoke
          BASE_URL: http://localhost:8000
          INTERNAL_API_KEY: perf-api-key
        run: |
          k6 run \
            --env K6_SCENARIO=smoke \
            --env BASE_URL=http://localhost:8000 \
            --env INTERNAL_API_KEY=perf-api-key \
            --out json=k6/results/watchlist-smoke.json \
            k6/watchlist.test.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: k6-performance-results
          path: k6/results/

      - name: Post k6 summary as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          parse() {
            local file=$1 label=$2
            if [ ! -f "$file" ]; then echo "| $label | n/a | n/a | n/a |"; return; fi
            python3 - "$file" "$label" <<'PYEOF'
          import sys, json
          file, label = sys.argv[1], sys.argv[2]
          p95 = med = fail = "n/a"
          with open(file) as f:
            for line in f:
              try:
                obj = json.loads(line)
              except Exception:
                continue
              if obj.get("type") == "Point" and obj.get("metric") == "http_req_duration":
                pass
              if obj.get("type") == "Point" and obj.get("metric") == "http_req_failed":
                pass
          # Read summary from end-of-run aggregate metrics
          metrics = {}
          with open(file) as f:
            for line in f:
              try:
                obj = json.loads(line)
              except Exception:
                continue
              if obj.get("type") == "Metric":
                metrics[obj["data"]["name"]] = obj["data"]
              if obj.get("type") == "Point":
                name = obj.get("metric","")
                val  = obj["data"].get("value", 0)
                tags = obj["data"].get("tags", {})
                if name == "http_req_duration":
                  metrics.setdefault("http_req_duration", {}).setdefault("values", {})
                if name == "http_req_failed":
                  metrics.setdefault("http_req_failed_last", val)
          # Parse summary block (last Metric entries have aggregates)
          p95 = med = fail = "n/a"
          with open(file) as f:
            raw = f.read()
          for line in raw.splitlines():
            try:
              obj = json.loads(line)
            except Exception:
              continue
            if obj.get("type") == "Point" and obj.get("metric") == "http_req_duration":
              v = obj["data"].get("value")
              if v is not None:
                try: p95 = f"{float(v):.0f}ms"
                except: pass
            if obj.get("type") == "Point" and obj.get("metric") == "http_req_failed":
              v = obj["data"].get("value")
              if v is not None:
                try: fail = f"{float(v)*100:.1f}%"
                except: pass
          print(f"| {label} | {p95} | {med} | {fail} |")
          PYEOF
          }

          COINS=$(parse k6/results/coins-smoke.json "coins")
          AUTH=$(parse k6/results/auth-smoke.json "auth")
          WATCHLIST=$(parse k6/results/watchlist-smoke.json "watchlist")

          BODY="## k6 Smoke Test Results

          | Scenario | p95 latency | median | error rate |
          |---|---|---|---|
          ${COINS}
          ${AUTH}
          ${WATCHLIST}

          > Smoke: 1 VU · 30s · thresholds: p99 < 500ms, error rate < 1%"

          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY" || true

      - name: Print server logs on failure
        if: failure()
        run: cat /tmp/uvicorn-perf.log || true

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-test, integration-db-test]
    permissions:
      contents: read
      pull-requests: write  # allows posting coverage summary comment on PRs
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install coverage[toml] -q

      - name: Download unit coverage data
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: coverage-unit

      - name: Download integration coverage data
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: coverage-integration

      - name: Merge coverage data and enforce threshold
        run: |
          coverage combine coverage.unit coverage.integration
          coverage xml -o coverage.xml
          coverage report --fail-under=70

      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303  # v5.1.2
        with:
          files: coverage.xml
          fail_ci_if_error: false  # Codecov outage should not block the pipeline
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, integration-db-test, integration-test, performance-test, iac-validate, lockfile-check, pipeline-scan, coverage]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # OIDC-based AWS auth — no AWS_ACCESS_KEY_ID stored as GitHub secret
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda  # v2.0.1

      - name: Build and push (tagged with commit SHA — never 'latest')
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  image-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write  # upload SARIF results to GitHub Security tab
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda  # v2.0.1

      - name: Scan image for CVEs (Trivy)
        # Trivy scans OS packages + Python deps inside the image.
        # CRITICAL/HIGH CVEs fail the pipeline — MEDIUM and below are reported only.
        # Results are uploaded to GitHub Security tab as SARIF for triage.
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # v0.28.0
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"           # fail the job if CRITICAL or HIGH CVEs found
          ignore-unfixed: true     # skip CVEs with no available fix (can't act on them)

      - name: Upload Trivy results to GitHub Security tab
        if: always()  # upload even on failure so findings are visible for triage
        uses: github/codeql-action/upload-sarif@dd196557e0ba53ab6f7c15b4bdf3a4c1e36c9ef  # v3.28.1
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: image-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS service with new image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
